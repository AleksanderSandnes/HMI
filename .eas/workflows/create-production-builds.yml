name: Create Production Builds

# Manual-only workflow (no triggers): run on demand when you want a
# production build, e.g. from the EAS dashboard or with
#   npx eas-cli@latest workflow:run create-production-builds.yml
# iOS requires an Apple Developer account configured in EAS before it
# can build/sign; Android works without one.

jobs:
  build_android:
    name: Build Android
    type: build
    params:
      platform: android
      profile: production
  build_ios:
    name: Build iOS
    type: build
    params:
      platform: ios
      profile: production
