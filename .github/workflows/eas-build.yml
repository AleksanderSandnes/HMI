name: EAS Build

on:
  # Automatic builds when frontend code lands on main.
  push:
    branches: [main]
    paths-ignore:
      - "backend/**"
      - "**/*.md"
      - ".github/dependabot.yml"
  # Manual trigger with selectable platform/profile.
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        type: choice
        default: all
        options:
          - all
          - android
          - ios
      profile:
        description: "EAS build profile"
        type: choice
        default: production
        options:
          - production
          - development

concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: EAS Build (${{ github.event.inputs.platform || 'all' }})
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Run EAS build
        run: |
          eas build \
            --platform ${{ github.event.inputs.platform || 'all' }} \
            --profile ${{ github.event.inputs.profile || 'production' }} \
            --non-interactive \
            --no-wait
