name: 🚀 Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-backend:
    name: 📦 Deploy weather API
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/weatherAPI/package-lock.json

      - name: 📦 Install dependencies
        working-directory: backend/weatherAPI
        run: npm ci

      - name: 🧪 Run tests (if any)
        working-directory: backend/weatherAPI
        run: npm test --if-present

      - name: ✅ Backend Ready for Deployment
        run: echo "✅ Backend build successful - Render will auto-deploy from main branch"

  deploy-java-api:
    name: ☕ Deploy growatt API
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: 🔨 Build with Maven
        working-directory: backend/growattAPI
        run: mvn clean package -DskipTests

      - name: ✅ Java API Ready for Deployment
        run: echo "✅ Java API build successful - Render will auto-deploy from main branch"

  health-check:
    name: 🏥 Health Check Services
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-java-api]
    steps:
      - name: ⏳ Wait for deployment
        run: |
          echo "⏳ Waiting for services to deploy..."
          sleep 30

      - name: 🏥 Check Backend Health
        run: |
          echo "🔍 Checking backend health..."
          curl -f https://weatherAPI.onrender.com/api/health || echo "⚠️ Backend not yet ready"

      - name: 🏥 Check Java API Health
        run: |
          echo "🔍 Checking Java API health..."
          curl -f https://growattAPI.onrender.com/actuator/health || echo "⚠️ Java API not yet ready"

      - name: 🎉 Deployment Status
        run: |
          echo "🎉 Deployment workflow completed!"
          echo "📋 Services will be available at:"
          echo "   Frontend: https://hmi-git-main-apsandnes-projects.vercel.app"
          echo "   Backend:  https://weatherAPI.onrender.com"
          echo "   Java API: https://growattAPI.onrender.com"
