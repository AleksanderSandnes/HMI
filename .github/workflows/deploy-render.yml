name: 🚀 Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-backend:
    name: 📦 Deploy weather API
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/weatherAPI/package-lock.json

      - name: 📦 Install dependencies
        working-directory: backend/weatherAPI
        run: npm ci

      - name: 🧪 Run tests (if any)
        working-directory: backend/weatherAPI
        run: npm test --if-present

      - name: ✅ Backend Ready for Deployment
        run: echo "✅ Backend build successful - Render will auto-deploy from main branch"

      - name: 🚀 Trigger Render Deployment (Backend)
        run: |
          echo "🚀 Triggering Render deployment for backend..."
          # Render auto-deploys on push to main, but we can also trigger via webhook
          # This ensures deployment happens even if Render missed the GitHub webhook
          if [ -n "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}" || echo "⚠️ Deploy hook failed, relying on auto-deploy"
          else
            echo "ℹ️  Using Render auto-deploy (no deploy hook configured)"
          fi

  deploy-java-api:
    name: ☕ Deploy growatt API
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: 🔨 Build with Maven
        working-directory: backend/growattAPI
        run: mvn clean package -DskipTests

      - name: ✅ Java API Ready for Deployment
        run: echo "✅ Java API build successful - Render will auto-deploy from main branch"

      - name: 🚀 Trigger Render Deployment (Java API)
        run: |
          echo "🚀 Triggering Render deployment for Java API..."
          # Render auto-deploys on push to main, but we can also trigger via webhook
          if [ -n "${{ secrets.RENDER_JAVA_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.RENDER_JAVA_DEPLOY_HOOK }}" || echo "⚠️ Deploy hook failed, relying on auto-deploy"
          else
            echo "ℹ️  Using Render auto-deploy (no deploy hook configured)"
          fi

  health-check:
    name: 🏥 Health Check Services
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-java-api]
    steps:
      - name: ⏳ Wait for initial deployment
        run: |
          echo "⏳ Waiting for Render services to deploy..."
          echo "ℹ️  Render auto-deploy typically takes 2-5 minutes"
          echo "ℹ️  Free tier services may take additional time to start"
          echo "⏳ Waiting 3 minutes for deployment to complete..."
          sleep 180

      - name: 🏥 Check Backend Health (with retries)
        run: |
          echo "🔍 Checking backend health (with cold start handling)..."
          echo "🔗 Target: https://hmi-backend.onrender.com/api/health"

          for i in {1..5}; do
            echo "🔄 Health check attempt $i/5..."
            if curl -sf --max-time 30 https://hmi-backend.onrender.com/api/health; then
              echo "✅ Backend is healthy!"
              break
            else
              if [ $i -eq 5 ]; then
                echo "⚠️ Backend not responding after 5 attempts (likely still starting up)"
              else
                echo "⏳ Backend not ready, waiting 30 seconds..."
                sleep 30
              fi
            fi
          done

      - name: 🏥 Check Java API Health (with retries)
        run: |
          echo "🔍 Checking Java API health (with cold start handling)..."
          echo "🔗 Target: https://hmi-java-api.onrender.com/actuator/health"

          for i in {1..6}; do
            echo "🔄 Health check attempt $i/6..."
            if curl -sf --max-time 30 https://hmi-java-api.onrender.com/actuator/health; then
              echo "✅ Java API is healthy!"
              break
            else
              if [ $i -eq 6 ]; then
                echo "⚠️ Java API not responding after 6 attempts (likely still starting up)"
              else
                echo "⏳ Java API not ready, waiting 45 seconds..."
                sleep 45
              fi
            fi
          done

      - name: 🎉 Deployment Status
        run: |
          echo "🎉 Deployment workflow completed!"
          echo "📋 Services will be available at:"
          echo "   Frontend: https://hmi-git-main-apsandnes-projects.vercel.app"
          echo "   Backend:  https://hmi-backend.onrender.com"
          echo "   Java API: https://hmi-java-api.onrender.com"
