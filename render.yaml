services:
  # Growatt solar API (Java / Spring Boot). The Node weatherAPI has been retired —
  # auth, weather, settings and notifications are served by Supabase directly.
  - type: web
    name: growattAPI
    runtime: docker
    plan: starter
    rootDir: backend/growattAPI
    dockerfilePath: Dockerfile
    envVars:
      - key: SERVER_PORT
        value: "8080"
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: FRONTEND_URL
        value: https://hmi-six.vercel.app
      # Supabase Postgres (Supavisor session-mode pooler). URL + username are not secret;
      # the DB password is set in the Render dashboard (sync:false).
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:5432/postgres?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        value: postgres.xdttfrknoazcqcelieck
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      # Optional outbound proxy if Growatt IP-blocks this host (leave unset normally).
      - key: PROXY_URL
        sync: false
      - key: PROXY_PORT
        sync: false
    healthCheckPath: /actuator/health
    autoDeploy: true
    branch: main
    buildFilter:
      paths:
        - backend/growattAPI/**
