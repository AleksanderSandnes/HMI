services:
  - type: web
    name: weatherAPI
    runtime: node
    plan: free
    rootDir: backend/weatherAPI
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '5000'
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://hmi-git-main-apsandnes-projects.vercel.app
      - key: WEATHER_API_KEY
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
    branch: main

  - type: web
    name: hmi-java-api
    runtime: docker
    plan: free
    rootDir: backend/growattAPI
    dockerfilePath: Dockerfile
    envVars:
      - key: SERVER_PORT
        value: '8080'
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: FRONTEND_URL
        value: https://hmi-git-main-apsandnes-projects.vercel.app
      - key: BACKEND_URL
        value: https://hmi-backend.onrender.com
    healthCheckPath: /actuator/health
    autoDeploy: true
    branch: main
