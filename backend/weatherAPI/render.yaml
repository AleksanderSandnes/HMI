services:
  - type: web
    name: weatherAPI
    runtime: node
    plan: free
    rootDir: backend/weatherAPI
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://hmi-git-main-apsandnes-projects.vercel.app
      - key: WEATHER_API_KEY
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
    branch: main
    buildFilter:
      paths:
        - backend/weatherAPI/**
