# Local development profile — run with: SPRING_PROFILES_ACTIVE=local mvn spring-boot:run
# Targets a local Supabase stack (`supabase start`). Override any value with the
# matching env var if your local ports/credentials differ.
server.port=${PORT:8080}

# Local logging — verbose enough to see Growatt login + cache behaviour.
logging.level.root=WARN
logging.level.controller=INFO
logging.level.service=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Actuator (same surface as production).
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# Stateless API; security is JWT-based (see below), no form login user.
spring.security.user.password=disabled

# Local Supabase Postgres (default CLI credentials: postgres/postgres on 54322).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:54322/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}

# Schema is owned by Supabase migrations — never let Hibernate touch it.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Don't let DB availability fail the health check while iterating.
management.health.db.enabled=false

# Validate JWTs against the LOCAL Supabase JWKS. Supabase signs with ES256.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SUPABASE_JWKS_URI:http://localhost:54321/auth/v1/.well-known/jwks.json}
spring.security.oauth2.resourceserver.jwt.jws-algorithms=ES256

# Optional outbound proxy for Growatt requests (normally unset locally).
growatt.proxy.url=${PROXY_URL:}
growatt.proxy.port=${PROXY_PORT:0}

# Allow the local web (Next dev :3000) and Expo (web :8081) origins.
cors.allowed-origins=${FRONTEND_URL:http://localhost:3000,http://localhost:8081}
