# Production Configuration for Render.com
server.port=${PORT:8080}

# Production Logging
logging.level.root=WARN
logging.level.controller=INFO
logging.level.service=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Production Actuator Settings
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# Stateless API; security is JWT-based (see below), no form login user.
spring.security.user.password=disabled
server.servlet.session.cookie.secure=true

# Supabase Postgres (JPA). Connect via the Supavisor session-mode pooler by default
# (username is postgres.<project-ref>). Override any of these with env vars on Render.
# The DB password is the project DB password (NOT the service-role key) — keep it secret.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.xdttfrknoazcqcelieck}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}

# Schema is owned by Supabase migrations — never let Hibernate touch it.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Don't let DB availability fail the Render health check (/actuator/health).
management.health.db.enabled=false

# Validate Supabase-issued JWTs against the project JWKS. Supabase signs with ES256, so
# the accepted JWS algorithm must be set explicitly (Spring's default is RS256).
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SUPABASE_JWKS_URI:https://xdttfrknoazcqcelieck.supabase.co/auth/v1/.well-known/jwks.json}
spring.security.oauth2.resourceserver.jwt.jws-algorithms=ES256

# Optional outbound proxy for Growatt requests — the escalation lever if Growatt
# IP-blocks the server's egress. Leave unset to connect directly.
growatt.proxy.url=${PROXY_URL:}
growatt.proxy.port=${PROXY_PORT:0}

# CORS Origins from Environment
cors.allowed-origins=${FRONTEND_URL:https://hmi-seven.vercel.app}

# JVM Options for Production
server.tomcat.threads.max=10
server.tomcat.max-connections=50
