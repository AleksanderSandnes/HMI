# Production Configuration for Render.com
server.port=${PORT:8080}

# Production Logging
logging.level.root=WARN
logging.level.controller=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Production Actuator Settings
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# Production Security
spring.security.user.password=disabled
server.servlet.session.cookie.secure=true

# MongoDB (Atlas). NOTE: the base application.properties is git-ignored and is
# NOT included in the Render build, so the production Mongo connection MUST be
# configured here. Prefer an explicit MONGODB_URI secret if set; otherwise build
# the Atlas SRV string from the DB_USERNAME / DB_PASSWORD env vars (same cluster
# and credentials as the weatherAPI backend). The "/HMI" path selects the DB.
spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://${DB_USERNAME}:${DB_PASSWORD}@hmi.g7qbf6h.mongodb.net/HMI?retryWrites=true&w=majority&appName=HMI}

# Don't let MongoDB availability fail the Render health check (/actuator/health).
management.health.mongo.enabled=false

# CORS Origins from Environment
cors.allowed-origins=${FRONTEND_URL:https://hmi-git-main-apsandnes-projects.vercel.app},${BACKEND_URL:https://weatherapi-sbwb.onrender.com}

# JVM Options for Production
server.tomcat.threads.max=10
server.tomcat.max-connections=50
